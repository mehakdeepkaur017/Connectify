paths:
  /auth/signup:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, username, email, password]
              properties:
                fullName:
                  type: string
                  example: John Doe
                username:
                  type: string
                  example: johndoe
                email:
                  type: string
                  example: user@example.com
                password:
                  type: string
                  example: password123
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Validation error or User already exists
  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                email:
                  type: string
                  description: Email or username
                  example: user@example.com
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
        '403':
          description: Email not verified
  /auth/logout:
    post:
      summary: Logout user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out successfully
        '401':
          description: Unauthorized
  /auth/forgot-password:
    post:
      summary: Request password reset link
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: user@example.com
      responses:
        '200':
          description: Reset link sent
  /auth/reset-password:
    post:
      summary: Reset password using token
      tags: [Auth]
      parameters:
        - in: query
          name: token
          schema:
            type: string
          required: true
          description: Reset token received via email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  example: newpassword123
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid or expired token
  /auth/verify-email:
    get:
      summary: Verify user email
      tags: [Auth]
      parameters:
        - in: query
          name: token
          schema:
            type: string
          required: true
          description: Verification token received via email
      responses:
        '200':
          description: Email successfully verified
        '400':
          description: Invalid or expired token
  /auth/resend-verification:
    post:
      summary: Resend verification email
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: user@example.com
      responses:
        '200':
          description: Verification link sent
        '400':
          description: Email is already verified
  /auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      responses:
        '200':
          description: Token refreshed successfully
        '401':
          description: No refresh token or invalid token provided
  /auth/me:
    get:
      summary: Get current authenticated user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User details
        '401':
          description: Unauthorized
